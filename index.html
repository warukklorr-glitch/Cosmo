<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmo Play Station</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-gray-100 min-h-screen p-4">

    <div id="popup-backdrop" class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 hidden">
        <div class="bg-slate-900 border border-cyan-500 rounded-2xl w-full max-w-xs p-6 text-center">
            <h3 class="text-xl font-black text-white">Pesanan Terkirim!</h3>
            <button onclick="location.reload()" class="mt-6 w-full bg-cyan-600 py-2 rounded-xl font-bold text-white">OKE</button>
        </div>
    </div>

    <div id="hal-operator" class="max-w-xl mx-auto hidden">
        <h2 class="text-2xl font-black text-cyan-400 mb-6 uppercase">Monitor Kasir</h2>
        <div id="list-pesanan" class="space-y-4"></div>
    </div>

    <div id="hal-konsumen" class="max-w-md mx-auto">
        <h1 class="text-2xl font-black text-center text-cyan-400 mb-6 uppercase">Cosmo Play Station</h1>
        <div id="info-meja" class="text-center mb-4 font-bold text-blue-400"></div>
        <div id="wadah-menu-list" class="space-y-3"></div>
        <div class="mt-6 p-4 bg-slate-900 rounded-xl border border-cyan-500 text-center">
            <div class="text-sm text-gray-400">Total Harga:</div>
            <div id="total-harga" class="text-2xl font-black text-cyan-400">Rp 0</div>
        </div>
        <button onclick="kirimPesanan()" class="w-full mt-4 bg-gradient-to-r from-blue-600 to-cyan-500 py-4 rounded-xl font-black uppercase text-white shadow-lg">Kirim Pesanan</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAklu0gWnJQutvrGIPX-Hlaa90zS98nY38",
            authDomain: "cosmos-b240a.firebaseapp.com",
            projectId: "cosmos-b240a",
            storageBucket: "cosmos-b240a.firebasestorage.app",
            messagingSenderId: "447497705248",
            appId: "1:447497705248:web:6ff442c5e0fc232b26a945"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const params = new URLSearchParams(window.location.search);
        const nomorMeja = params.get('meja') || "Umum";
        const isOperator = params.get('mode') === 'operator';

        const menuData = [
            { nama: "Tea Jus", harga: 2000 }, { nama: "Marimas", harga: 2000 },
            { nama: "Es Teh", harga: 3000 }, { nama: "Nutrisari", harga: 4000 },
            { nama: "White Coffe", harga: 4000 }, { nama: "Cappucino", harga: 5000 },
            { nama: "Snack - Snack", harga: 3000 }, { nama: "Indomie Goreng", harga: 6000 },
            { nama: "Indomie Goreng Telur", harga: 9000 }, { nama: "Paket 1 PS3", harga: 15000 },
            { nama: "Paket Ramai PS4", harga: 30000 }
        ];

        let keranjang = {};

        // OPERATOR
        if (isOperator) {
            document.getElementById('hal-operator').classList.remove('hidden');
            document.getElementById('hal-konsumen').classList.add('hidden');
            let lastCount = 0;
            onSnapshot(query(collection(db, "pesanan"), orderBy("waktuServer", "desc")), (snapshot) => {
                const list = document.getElementById('list-pesanan');
                list.innerHTML = "";
                
                // Cek notifikasi suara
                if(snapshot.size > lastCount && lastCount !== 0) {
                    new Audio('https://actions.google.com/sounds/v1/notifications/beep_short.ogg').play();
                }
                lastCount = snapshot.size;

                snapshot.forEach(doc => {
                    const d = doc.data();
                    list.innerHTML += `<div class="bg-slate-900 p-4 rounded-xl border border-blue-500">
                        <div class="flex justify-between text-xs text-blue-400 font-bold uppercase"><span>Meja: ${d.meja}</span><span>${d.jam}</span></div>
                        <div class="font-bold mt-2 text-sm">${JSON.stringify(d.pesanan).replace(/["{}]/g, '').replace(/:/g, ' x ').replace(/,/g, ', ')}</div>
                        <div class="text-cyan-400 font-black mt-2">Total: Rp ${d.total.toLocaleString()}</div>
                        <button onclick="selesai('${doc.id}')" class="mt-3 w-full bg-green-600 py-2 rounded-lg font-black uppercase text-xs">Selesai</button>
                    </div>`;
                });
            });
        } else {
            // KONSUMEN
            document.getElementById('info-meja').innerText = "Pesanan untuk: Meja/TV " + nomorMeja;
            menuData.forEach(item => {
                keranjang[item.nama] = { qty: 0, harga: item.harga };
                document.getElementById('wadah-menu-list').innerHTML += `
                <div class="bg-slate-900 p-4 rounded-xl border border-blue-900 flex justify-between items-center">
                    <div><div class="font-bold">${item.nama}</div><div class="text-xs text-blue-400">Rp ${item.harga.toLocaleString()}</div></div>
                    <div class="flex items-center gap-3">
                        <button onclick="ubah('${item.nama}', -1)" class="bg-slate-800 w-8 h-8 rounded-lg font-bold">-</button>
                        <span id="qty-${item.nama.replace(/\s+/g, '-')}" class="w-6 text-center font-bold">0</span>
                        <button onclick="ubah('${item.nama}', 1)" class="bg-slate-800 w-8 h-8 rounded-lg font-bold">+</button>
                    </div>
                </div>`;
            });
        }

        window.ubah = (nama, delta) => {
            keranjang[nama].qty = Math.max(0, keranjang[nama].qty + delta);
            document.getElementById(`qty-${nama.replace(/\s+/g, '-')}`).innerText = keranjang[nama].qty;
            let total = 0;
            Object.values(keranjang).forEach(i => total += (i.qty * i.harga));
            document.getElementById('total-harga').innerText = "Rp " + total.toLocaleString();
        };

        window.selesai = (id) => deleteDoc(doc(db, "pesanan", id));

        window.kirimPesanan = async () => {
            const p = {}; let total = 0;
            Object.keys(keranjang).forEach(k => {
                if(keranjang[k].qty > 0) { p[k] = keranjang[k].qty; total += (keranjang[k].qty * keranjang[k].harga); }
            });
            if (total === 0) return alert("Pilih menu dulu!");
            await addDoc(collection(db, "pesanan"), { pesanan: p, total: total, meja: nomorMeja, jam: new Date().toLocaleTimeString('id-ID'), waktuServer: serverTimestamp() });
            document.getElementById('popup-backdrop').classList.remove('hidden');
        };
    </script>
</body>
</html>
